<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LifeDrop Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="styles/notifications.css"> 
 <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100;9..40,200;9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900;9..40,1000&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="styles/map.css">

</head>

<body>

<div class="map-page">

    
          <header class="header">
        <div class="left-section">
            <img class="logo" src="images/Blur.svg" alt="logo">
            <img class="logo1" src="images/LifeDrop.svg" alt="logo1">
        </div>

        <nav class="middle-section">
            <a href="home.html" class="taps ">Home</a>
            <a href="map.html" class="taps">Map</a>
            <a href="search.html" class="taps">Search</a>
        </nav>

        <div class="right-section">
            <div class="notif-wrapper">
                <button class="notif-trigger" id="notifBtn">
                    <img class="bell-img" src="images/bell.svg" alt="notifications">
                    <div class="red-dot" id="notifBadge"></div>
                </button>

                <div class="dropdown-container" id="notifDropdown">
                <div id="notifList"></div>    
                  <button class="mark-read-btn" id="markReadBtn">Mark all as read</button>

                    <div class="empty-state" id="emptyState">
                        <div class="check-icon-large">
                            <img class="large-notif-img" src="images/gg_check-o.svg" alt="caught-up">
                        </div>
                        <h3 class="empty-title">You’re All Caught Up</h3>
                        <p class="empty-desc">No new notifications for now</p>
                    </div>
                </div>
            </div>

            <button class="profile" id="profile">
                <img class="profile-img" src="" alt="profile-picture">
            </button>
        </div>
    </header>
    <div id="notifModal" class="modal-overlay">
    <div class="frame-33">
        <div class="vector-circle">
            <img src="images/Vector-heart.svg" alt="heart"> 
        </div>
        
        <h2 class="modal-title">DONOR MATCH FOUND!</h2>

        <div class="donor-info">
            <img src="" id="modalImg" class="donor-img">
            <div class="donor-text">
                <span id="modalName" class="donor-name">Abd El-Malek Zerarga</span>
                <span id="modalLocation" class="donor-loc">El-Eulma, Sétif</span>
            </div>
        </div>

        <p class="modal-msg">Hello, I am nearby and I can be at EPSP</p>

        <div class="modal-buttons">
            <button class="btn-accept">Accept Request</button>
            <button class="btn-cancel" id="closeModal">Cancel</button>
        </div>
    </div>
</div>

    <div id="map"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="scripts/map.js"></script>
<script src="scripts/notifications.js"></script>

</body>
</html>
