<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDrop - Reset Password</title>
    <link rel="stylesheet" href="styles/forgot_password.css">
</head>
<body>

    <div class="container">
        <div class="left-side">
            
            <section id="step1" class="form-step active">
                <div class="progress-bar">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <h1>Forgot password?</h1>
                <p class="subtitle">No worries! Enter your email and we'll send you a reset code.</p>
                
                <div class="input-group">
                    <label>Email</label>
                  <div class="input-wrapper" id="input-wrapper">
                    <img src="images/Component 1.svg" class="email_icon">
                    <input type="email" id="emailInput" placeholder=" Enter your email" required>
                </div>
                </div>
                
                <button class="btn-main" onclick="validateStep1()">Send Reset Code</button>
                <p class="footer-text">Remember it? <a href="logIn.html">Log in</a></p>
            </section>

            <section id="step2" class="form-step">
                <div class="progress-bar">
                    <span class="dot active"></span>
                    <span class="dot active"></span>
                    <span class="dot"></span>
                </div>
                <h1>Check your email</h1>
                <p class="subtitle">We sent a 6-digit code to <strong id="displayEmail"></strong></p>
                
                <div class="otp-container" id="otpBox">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                </div>
                
                <button class="btn-main" onclick="validateStep2()">Verify code</button>
                <p class="footer-text">Didn't get it? <span id="resend-timer" onclick="startTimer()">Resend code</span></p>
            </section>

            <section id="step3" class="form-step">
                <div class="progress-bar">
                    <span class="dot active"></span>
                    <span class="dot active"></span>
                    <span class="dot active"></span>
                </div>
                <h1>Reset your password</h1>
                <p class="subtitle">Almost done. Choose a strong new password for your account.</p>
                
                <div class="input-group">
                    <label>New password</label>
                    <div class="input-wrapper" id="input-wrapper1">
                    <img src="images\arcticons_password.svg" class="lock-icon">
                    <input type="password" id="newPass" placeholder="At least 8 characters">
                </div>
                </div>
                <div class="input-group">
                    <label>Confirm password</label>
                    <div class="input-wrapper" id="input-wrapper2">
                    <img src="images\arcticons_password.svg" class="lock-icon">
                    <input type="password" id="confirmPass" placeholder="Rewrite your password">
                </div>
                </div>
                
                <button class="btn-main" onclick="validateStep3()">Reset password</button>
            </section>

        </div>

        <div class="right-side" id="custom-content">
             <div class="top-section">
            <img class="life-drop" src="images/Frame 10.svg" alt="logo">
        </div>
        
        <div class="content-section">
            <p class="welcome">Welcome back</p>
            <p class="together">Together, we save lives</p>
            <img class="drop" src="images/Screenshot 2026-02-19 234301 1.svg" alt="drop">
        </div>
            </div>
    </div>

    <script src="scripts/forgot_password.js"></script>
</body>
</html>
