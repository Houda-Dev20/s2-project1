<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/login.css">
    
</head>
<body>
 <div class="container">
    <div class="left-side">
        <form class="login-form" id="login-form">
            <p class="login">Log in</p>
            <div class="Email-div">
                <p class="email">Email</p>
                <input id="email" class="email-input" type="email" placeholder=" Enter your email">
            </div>
            <div class="password-div">
                <p class="password">Password</p>
                <input class="password-input" id="password-input" type="password" placeholder=" Enter your password" required minlength="8">
                <button class="eye-btn" id="eye-btn">
                    <img src="images/basil_eye-closed-outline.svg" id="eye-icon" class="eye-icon">
                </button>
            </div>
            <div class="forget-div">
                <div class="remember-div">
                    <input class="remember-checkbox" type="checkbox">
                    <p class="remember">Remember me</p>
                </div>
                    <a href="" class="forget"  >Forgot Password?</a>
            </div>
            <button type="submit" class="log-btn">Log in</button>
            <p class="or">or</p>
            <button class="google" id="google">
                 <img  class="google-icon" src="images/Group 11.svg" alt="google">
                 Continue with Google
            </button>
            <div class="join-div">
                <p class="account">Don't have an account?</p>
                <a href="#" class="join-link" id="join">join</a>
            </div>
        </form>
    </div>
    <div class="right-side">
        <div class="top-section">
            <img class="life-drop" src="images/Frame 10.svg" alt="logo">
        </div>
        
        <div class="content-section">
            <p class="welcome">Welcome back</p>
            <p class="together">Together, we save lives</p>
            <img class="drop" src="images/Screenshot 2026-02-19 234301 1.svg" alt="drop">
        </div>
    </div>
 </div> 
 <div class="modal" id="modal">
        <div class="modal-inner">
            <div class="joindiv">
                 <p class="jointext">How would you like to join?</p> 
                 <button onclick="" class="close-modal" id="closeModel">×</button>
            </div>
           
            <div class="donor">  
                <div class="heart">
                    <img class="heartpic" src="images/ri_heart-add-fill.svg" alt="heart">
                </div>
                <div class="donortxt">
                    <p class="request">I Want To Give</p>
                    <p class="help">help others by giving them blood</p>
                    <form action="donor-signup.html">
                    <button id="closeModal1" class="donorbtn">Become a Donor</button>
                    </form>
                </div> 
            </div>
            <div class="searcher">
                <div class="hand">
                    <img class="handpic" src="images/solar_hand-heart-linear.svg" alt="need help">
                </div>
                <div class="searchertxt">
                    <p class="request">I Need help</p>
                    <p class="help">help others by giving them blood</p>
                    <form action="request-blood.html">
                    <button id="closeModal2" class="searcherbtn">Request Help </button>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
<script src="scripts/login.js"></script>
</body>
</html>
