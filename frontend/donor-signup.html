        <style>


.container {
    width: 455px;
    border-radius: 35px; 
}


select {
    width: 100%;
    height: 60px;
    padding: 10px;
    border-radius: 10px;
   
}
</style>

<body>

    <div class="main-container">
        <div class="left-panel1">
            <div class="brand">
                <img src="images/Blur.svg" alt="logo icon" class="logo-icon">
                <span class="logo-text">LifeDrop</span>
            </div>

            <div class="hero-content1">
                <h1>Sign up to be a donor</h1>
                <p>Give a drop and help save lives</p>
                <img src="images/ChatGPT Image Feb 20, 2026, 11_08_06 PM 1.svg" alt="LifeDrop Character"
                    class="hero-img">
            </div>
        </div>

        <div class="right-panel">
            <div class="signup-card">
                <h2>Sign up</h2>
                <form id="signupForm">
                    <div class="input-group">
                        <img src="images/boxicons_user-filled.svg" class="input-icon" alt="user">
                        <input type="text" id="full_name" placeholder="Enter your full name" required minlength="3">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Group 14.svg" class="input-icon" alt="date">
                        <input type="date" id="date_of_birth" placeholder="DD / MM / YYYY" required
                            pattern="\d{2}/\d{2}/\d{4}">
                        <small class="error-msg" style="color: red ;display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Vector1.svg" class="input-icon" alt="location">
                        <div class="container">
                            <select id="location">
                                <option >Select Location</option>
                            </select>
                        </div>
                        
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>


                    <div class="input-group">
                        <img src="images/Vector2.svg" class="input-icon" alt="blood type">

                        <div class="container-dropdown-simple">
                            <div class="input-box" onclick="toggleDropdown()" tabindex="0">
                                <input type="text" id="bloodInput" placeholder="Select your blood type" readonly
                                    required>
                                <span id="arrow-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M6 9l6 6 6-6" />
                                    </svg>
                                </span>
                            </div>

                            <div class="dropdown" id="dropdown">
                                <table>
                                    <tr>
                                        <td onclick="selectBlood(this,'O+')">O+</td>
                                        <td onclick="selectBlood(this,'O-')">O-</td>
                                    </tr>
                                    <tr>
                                        <td onclick="selectBlood(this,'A+')">A+</td>
                                        <td onclick="selectBlood(this,'A-')">A-</td>
                                    </tr>
                                    <tr>
                                        <td onclick="selectBlood(this,'B+')">B+</td>
                                        <td onclick="selectBlood(this,'B-')">B-</td>
                                    </tr>
                                    <tr>
                                        <td onclick="selectBlood(this,'AB+')">AB+</td>
                                        <td onclick="selectBlood(this,'AB-')">AB-</td>
                                    </tr>
                                </table>
                            </div>
                        </div>

                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
        position: absolute; bottom: -18px; left: 10px;"></small>
                    </div>
                    <div class="input-group">
                        <img src="images/Vector3.svg" class="input-icon" alt="phone">
                        <input type="tel" id="telephon" placeholder="Enter your phone number" required
                            pattern="^0(5|6|7)[0-9]{8}$">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Group 55.svg" class="input-icon" alt="email">
                        <input type="email" id="email" placeholder="Enter your email" required>
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/arcticons1_password.svg" class="icon-left" alt="lock">
                        <input type="password" id="password" placeholder="Enter your password" required minlength="8">
                        <img src="images/basil_eye-closed-outline.svg" class="icon-right" id="toggleEye"
                            alt="toggle password">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <button type="submit" class="btn-signup">Sign up</button>
                    <p class="privacy-text">
                        <img src="images/Group 25.svg" alt="lock"> Your information is safe and only shared with
                        verified patients.
                    </p>

                </form>
                <hr class="divider">
                <p class="footer-text">
                    <span>Already have an account? </span>
                    <a href="logIn.html">Log in</a>
                </p>

            </div>
        </div>
    </div>
    <script src="scripts/signup.js"></script>
</body>

</html>
