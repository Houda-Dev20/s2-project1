<body>

    <div class="main-container">
        <div class="left-panel2">
            <div class="brand">
                <img src="images/Blur1.svg" alt="logo icon" class="logo-icon">
                <span class="logo-text">LifeDrop</span>
            </div>

            <div class="hero-content2">
                <h1>Get the help you need</h1>
                <p>We are here to connect you with donors quickly and safely.</p>
                <img src="images/Gemini_Generated_Image_qm9zgvqm9zgvqm9z 1.svg" alt="LifeDrop Character"
                    class="hero-img">
            </div>
        </div>

        <div class="right-panel">
            <div class="signup-card">
                <h2>Sign up</h2>

                <form>
                    <div class="input-group">
                        <img src="images/boxicons_user-filled.svg" class="input-icon" alt="user">
                        <input type="text" placeholder="Enter your full name" required minlength="3">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Group 14.svg" class="input-icon" alt="date">
                        <input type="date" placeholder="DD / MM / YYYY" required pattern="\d{2}/\d{2}/\d{4}">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Vector1.svg" class="input-icon" alt="location">

                        <input type="text" placeholder="Enter Wilaya, Baladiya" required>
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>






                    <div class="input-group">
                        <img src="images/Vector2.svg" class="input-icon" alt="blood type">

                        <div class="container-dropdown-simple">
                            <div class="input-box" onclick="toggleDropdown()">
                                <input type="text" id="bloodInput" placeholder="blood type research" readonly
                                    required>
                                <span id="arrow-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M6 9l6 6 6-6" />
                                    </svg>
                                </span>
                            </div>

                            <div class="dropdown" id="dropdown">
                                <table>
                                    <tr>
                                        <td onclick="selectBlood(this,'O+')">O+</td>
                                        <td onclick="selectBlood(this,'O-')">O-</td>
                                    </tr>
                                    <tr>
                                        <td onclick="selectBlood(this,'A+')">A+</td>
                                        <td onclick="selectBlood(this,'A-')">A-</td>
                                    </tr>
                                    <tr>
                                        <td onclick="selectBlood(this,'B+')">B+</td>
                                        <td onclick="selectBlood(this,'B-')">B-</td>
                                    </tr>
                                    <tr>
                                        <td onclick="selectBlood(this,'AB+')">AB+</td>
                                        <td onclick="selectBlood(this,'AB-')">AB-</td>
                                    </tr>
                                </table>
                            </div>
                        </div>

                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
        position: absolute; bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Vector3.svg" class="input-icon" alt="phone">
                        <input type="tel" placeholder="Enter your phone number" required pattern="\d{2}/\d{2}/\d{4}">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/Group 55.svg" class="input-icon" alt="email">
                        <input type="email" placeholder="Enter your email" required>
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <div class="input-group">
                        <img src="images/arcticons1_password.svg" class="icon-left" alt="lock">
                        <input type="password" placeholder="Enter your password" required minlength="8">
                        <img src="images/basil_eye-closed-outline.svg" class="icon-right" id="toggleEye"
                            alt="toggle password">
                        <small class="error-msg" style="color: red; display: none; font-size: 11px;
                        position: absolute;bottom: -18px; left: 10px;"></small>
                    </div>

                    <button type="submit" class="btn-signup">Sign up</button>
                    <p class="privacy-text">
                        <img src="images/Group 25.svg" alt="lock"> Your information is safe and only shared with
                        verified patients.
                    </p>

                </form>
                <hr class="divider">
                <p class="footer-text">
                    <span>Already have an account? </span>
                    <a href="logIn.html">Log in</a>
                </p>

            </div>
        </div>
    </div>
    <script src="scripts/signup.js"></script>
